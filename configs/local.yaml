runtime:
  device: auto
  dtype: auto
  cache_dir: "models/hf-cache"

decision:
  review_threshold: 0.35
  block_threshold: 0.70
  fail_closed_for:
    - sexual_minors
    - extremism_terrorism_symbols
    - hate_extremism
    - terrorism_extremism
    - self_harm_instruction
    - self_harm_suicide
    - weapons_explosives_crime_instructions
    - fraud_phishing_social_engineering
    - fake_documents_cards_contracts
    - personal_financial_data
    - personal_biometric_data
    - fraudulent_qr_payment_push
  conflict_policy: review

detectors:
  prompt_keywords:
    enabled: true
    stages: ["prompt"]
    block_threshold: 1.0

  prompt_toxicity:
    enabled: true
    stages: ["prompt"]
    model_id: "cointegrated/rubert-tiny-toxicity"
    local_files_only: true
    review_threshold: 0.50
    block_threshold: 0.80

  nsfw_vit:
    enabled: true
    stages: ["input_image", "output_image"]
    model_id: "Falconsai/nsfw_image_detection"
    review_threshold: 0.35
    block_threshold: 0.70
    unsafe_labels:
      - nsfw
      - unsafe
      - not_safe
      - not safe for work

  prompt_zero_shot:
    enabled: false
    stages: ["prompt"]
    model_id: "MoritzLaurer/multilingual-MiniLMv2-L6-mnli-xnli"
    review_threshold: 0.45
    block_threshold: 0.80
    labels:
      sexual: "request for sexually explicit image generation"
      violence_gore: "request for graphic violence or gore"
      dangerous: "request for weapons, explosives, terrorism, self-harm, or real-world harm"
      hate_extremism: "request for hate, harassment, extremist symbols, or demeaning protected classes"
      personal_financial_data: "request to reveal or generate personal or financial data"

  llavaguard:
    enabled: false
    stages: ["input_image", "output_image"]
    model_id: "AIML-TUDA/LlavaGuard-v1.2-0.5B-OV-hf"
    review_threshold: 0.50
    block_threshold: 0.70
    max_new_tokens: 220
    temperature: 0.0

  clip_zero_shot:
    enabled: false
    stages: ["input_image", "output_image"]
    model_id: "openai/clip-vit-base-patch32"
    review_threshold: 0.35
    block_threshold: 0.65
    labels:
      weapon: "a photo of weapons, explosives, or military violence"
      blood: "a graphic photo of blood, injury, gore, or dead bodies"
      extremist_symbol: "a photo of extremist symbols or hate propaganda"
      bank_document: "a photo containing bank card numbers, passports, IDs, or account details"

  shieldgemma:
    enabled: false
    stages: ["input_image", "output_image"]
    model_id: "google/shieldgemma-2-4b-it"
    review_threshold: 0.35
    block_threshold: 0.70
    policies:
      - dangerous
      - sexual
      - violence
